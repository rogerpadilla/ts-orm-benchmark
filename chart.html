<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>TS ORM Benchmark</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Helvetica, 'Apple Color Emoji', Arial, sans-serif, 'Segoe UI Emoji', 'Segoe UI Symbol';
      background: #0a0a0f;
      color: #e6edf3;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      max-width: 800px;
      background: linear-gradient(145deg, #12131a 0%, #0d0e14 100%);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 24px;
      padding: 48px 52px 40px;
      box-shadow: 0 0 80px rgba(88, 166, 255, 0.04);
    }

    .header {
      text-align: center;
      margin-bottom: 36px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #58a6ff 0%, #a371f7 50%, #f778ba 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .header p {
      color: #6e7681;
      font-size: 14px;
      font-weight: 500;
    }

    .category { margin-bottom: 20px; }
    .category:last-child { margin-bottom: 0; }

    .category-label {
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .winner-badge {
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
    }

    .winner-uql { background: rgba(91, 106, 191, 0.15); color: #5b6abf; }

    .bars { display: flex; flex-direction: column; gap: 4px; }

    .bar-row {
      display: flex;
      align-items: center;
      height: 28px;
    }

    .bar-name {
      width: 100px;
      font-family: 'Inter', ui-sans-serif, -apple-system, system-ui, 'Segoe UI', Helvetica, 'Apple Color Emoji', Arial, sans-serif, 'Segoe UI Emoji', 'Segoe UI Symbol';
      font-size: 12px;
      font-weight: 700;
      color: #6e7681;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .bar-name a {
      color: inherit;
      text-decoration: none;
    }

    .bar-name a:hover {
      text-decoration: underline;
    }

    .legend-item a {
      color: inherit;
      text-decoration: none;
    }

    .legend-item a:hover {
      text-decoration: underline;
    }

    .bar-name img {
      width: 16px;
      height: 16px;
      border-radius: 4px;
    }

    .bar-track {
      flex: 1;
      height: 22px;
      background: rgba(255,255,255,0.02);
      border-radius: 6px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      font-size: 11px;
      font-weight: 700;
      color: white;
      min-width: 45px;
    }

    .fill-uql       { background: linear-gradient(90deg, #3d4a8f 0%, #5b6abf 100%); }
    .fill-sequelize  { background: linear-gradient(90deg, #0182b3 0%, #02afef 100%); }
    .fill-typeorm    { background: linear-gradient(90deg, #c55a1a 0%, #ff7733 100%); opacity: 0.75; }
    .fill-mikro      { background: linear-gradient(90deg, #148f75 0%, #1abc9c 100%); opacity: 0.65; }
    .fill-drizzle    { background: linear-gradient(90deg, #5a8a1e 0%, #7ab82d 100%); opacity: 0.70; }
    .fill-knex       { background: linear-gradient(90deg, #b83a28 0%, #e24a33 100%); opacity: 0.70; }
    .fill-kysely     { background: linear-gradient(90deg, #9b5de5 0%, #c084fc 100%); opacity: 0.70; }

    .bar-row.is-winner .bar-name { color: #e6edf3; }

    .footer {
      margin-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 20px;
      border-top: 1px solid rgba(255,255,255,0.04);
    }

    .footer-left { display: flex; gap: 18px; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: #6e7681;
      font-weight: 500;
    }

    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-uql { background: #5b6abf; }
    .dot-sequelize { background: #02afef; }
    .dot-typeorm { background: #ff7733; }
    .dot-mikro { background: #1abc9c; }
    .dot-drizzle { background: #7ab82d; }

    .footer-right { font-size: 11px; color: #484f58; font-weight: 500; }

    .score {
      text-align: center;
      margin-top: 28px;
      margin-bottom: 4px;
    }

    .score-text {
      font-size: 16px;
      font-weight: 700;
      color: #8b949e;
    }

    .score-text .uql-color { color: #5b6abf; }
    .score-text .sequelize-color { color: #02afef; }
    .score-text .sep { color: #30363d; margin: 0 6px; }
  </style>
</head>
<body>

<div class="card">
  <div class="header">
    <h1>⚡ TypeScript ORMs' SQL Generation Speed</h1>
    <p>ORMs and Query Builders · Ops/Sec · Higher = Better</p>
  </div>

  <div id="categories"></div>

  <div class="score">
    <span class="score-text">
      <span class="uql-color">UQL 8</span>
      <span class="sep">·</span>
      ORMs and Query Builders
    </span>
  </div>

  <div class="footer">
    <div class="footer-left">
      <div class="legend-item"><div class="legend-dot dot-uql"></div><a href="https://uql-orm.dev" target="_blank" rel="noopener">UQL</a></div>
      <div class="legend-item"><div class="legend-dot dot-sequelize"></div><a href="https://sequelize.org" target="_blank" rel="noopener">Sequelize</a></div>
      <div class="legend-item"><div class="legend-dot dot-typeorm"></div><a href="https://typeorm.io" target="_blank" rel="noopener">TypeORM</a></div>
      <div class="legend-item"><div class="legend-dot dot-mikro"></div><a href="https://mikro-orm.io" target="_blank" rel="noopener">MikroORM</a></div>
      <div class="legend-item"><div class="legend-dot dot-drizzle"></div><a href="https://orm.drizzle.team" target="_blank" rel="noopener">Drizzle</a></div>
      <div class="legend-item"><div class="legend-dot" style="background:#e24a33"></div><a href="https://knexjs.org" target="_blank" rel="noopener">Knex</a></div>
      <div class="legend-item"><div class="legend-dot" style="background:#c084fc"></div><a href="https://kysely.dev" target="_blank" rel="noopener">Kysely</a></div>
    </div>
    <div class="footer-right">Node.js v24 · Apple Silicon · github.com/rogerpadilla/ts-orm-benchmark</div>
  </div>
</div>

<script src="results.js"></script>
<script>
  const orms = ['UQL', 'Sequelize', 'TypeORM', 'MikroORM', 'Drizzle', 'Knex', 'Kysely'];
  const fills = ['fill-uql', 'fill-sequelize', 'fill-typeorm', 'fill-mikro', 'fill-drizzle', 'fill-knex', 'fill-kysely'];
  const colors = ['#5b6abf', '#02afef', '#ff7733', '#1abc9c', '#7ab82d', '#e24a33', '#c084fc'];
  const urls = [
    'https://uql-orm.dev',
    'https://sequelize.org',
    'https://typeorm.io',
    'https://mikro-orm.io',
    'https://orm.drizzle.team',
    'https://knexjs.org',
    'https://kysely.dev',
  ];
  const logos = [
    'assets/uql-icon.svg',                                   // UQL
    'https://avatars.githubusercontent.com/u/3591786?s=32',   // Sequelize
    'https://avatars.githubusercontent.com/u/20165699?s=32',  // TypeORM
    'https://mikro-orm.io/img/logo.svg',                     // MikroORM
    'https://avatars.githubusercontent.com/u/108468352?s=32', // Drizzle
    'https://avatars.githubusercontent.com/u/3137232?s=32',  // Knex
    'https://avatars.githubusercontent.com/u/123764858?s=32', // Kysely
  ];

  const chartCategories = [
    { key: 'insert',    label: 'INSERT — 10 rows in batch' },
    { key: 'update',    label: 'UPDATE — SET + WHERE' },
    { key: 'upsert',    label: 'UPSERT — ON CONFLICT by id' },
    { key: 'delete',    label: 'DELETE — simple WHERE' },
    { key: 'simple',    label: 'SELECT — 1 field' },
    { key: 'filter',    label: 'SELECT — WHERE + SORT + LIMIT' },
    { key: 'complex',   label: 'SELECT — Complex $or + Operators' },
    { key: 'aggregate', label: 'AGGREGATE — GROUP BY + COUNT + HAVING' },
  ];

  function renderBars(containerId, values) {
    const container = document.getElementById(containerId);
    const max = Math.max(...values);

    const sorted = values.map((val, i) => ({ val, i }))
      .filter(({ val }) => val > 0)
      .sort((a, b) => b.val - a.val);

    sorted.forEach(({ val, i }) => {
      const pct = Math.max((val / max) * 100, 4);
      const isWinner = val === max;
      const label = val >= 1000 ? (val / 1000).toFixed(1) + 'M' : val + 'K';
      const labelInside = pct >= 15;
      const row = document.createElement('div');
      row.className = 'bar-row' + (isWinner ? ' is-winner' : '');
      row.innerHTML = `
        <span class="bar-name" style="color:${colors[i]}"><img src="${logos[i]}" alt=""><a href="${urls[i]}" target="_blank" rel="noopener">${orms[i]}</a></span>
        <div class="bar-track" style="display:flex;align-items:center">
          <div class="bar-fill ${fills[i]}" style="width: ${pct}%">
            ${labelInside ? `<span style="margin-left:auto;padding-right:8px;white-space:nowrap">${label}</span>` : ''}
          </div>
          ${!labelInside ? `<span style="padding-left:8px;font-size:11px;font-weight:700;color:${colors[i]};white-space:nowrap">${label}</span>` : ''}
        </div>
      `;
      container.appendChild(row);
    });
  }

  // Render all categories dynamically from results.js
  const { data } = window.BENCH_DATA;
  const root = document.getElementById('categories');

  for (const { key, label } of chartCategories) {
    const values = data[key];
    const max = Math.max(...values);
    const sorted = [...values].sort((a, b) => b - a);
    const multiplier = (max / sorted[1]).toFixed(2);
    const winnerName = orms[values.indexOf(max)];

    const cat = document.createElement('div');
    cat.className = 'category';
    cat.innerHTML = `
      <div class="category-label">${label} <span class="winner-badge winner-uql">${winnerName} ${multiplier}x</span></div>
      <div class="bars" id="bars-${key}"></div>
    `;
    root.appendChild(cat);

    renderBars(`bars-${key}`, values);
  }
</script>

</body>
</html>
