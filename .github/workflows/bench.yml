name: Bench

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Benchmark results are updated locally on Apple Silicon (M-series)
  # to ensure consistent, reproducible numbers without Github Actions VM noise.
  # To update reports: npm run bench (locally)
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx tsc --noEmit
      - run: bunx vitest bench --run

  deploy:
    if: github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - run: |
          mkdir -p _site
          cp chart.html results.js README.md _site/
          cp -r assets _site/assets 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
      - id: deploy
        uses: actions/deploy-pages@v4
